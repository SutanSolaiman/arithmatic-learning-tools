  const CARDS_PER_PAGE = 1;
  const DAILY_GRADE_SHEET_NAME = "Nilai_Harian";
  const SUMMARY_SHEET_NAME = "Summary";

  async function callBackend(action, payload) {
    const normalizedPayload = payload || {};

    const response = await fetch("/api/learning-tools", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        action: action,
        payload: normalizedPayload,
        args: [normalizedPayload]
      })
    });

    const rawText = await response.text();

    let data;

    try {
      data = JSON.parse(rawText);
    } catch (err) {
      throw new Error(
        "Vercel API returned non-JSON response. HTTP " +
        response.status +
        ". Raw response starts with:\n" +
        rawText.substring(0, 3000)
      );
    }

    if (!response.ok) {
      throw new Error(
        data.rawResponseStart ||
        data.error ||
        data.message ||
        "HTTP " + response.status
      );
    }

    if (data && data.ok === false) {
      throw new Error(
        data.rawResponseStart ||
        data.error ||
        data.message ||
        "Backend returned ok=false."
      );
    }

    return unwrapBackendResponse(data);
  }

  function unwrapBackendResponse(value) {
    let current = value;
    let guard = 0;

    while (guard < 20) {
      guard++;

      if (typeof current === "string") {
        const trimmed = current.trim();

        if (
          (trimmed.charAt(0) === "{" && trimmed.charAt(trimmed.length - 1) === "}") ||
          (trimmed.charAt(0) === "[" && trimmed.charAt(trimmed.length - 1) === "]")
        ) {
          try {
            current = JSON.parse(trimmed);
            continue;
          } catch (err) {
            return current;
          }
        }

        return current;
      }

      if (!current || typeof current !== "object") {
        return current;
      }

      if (current.ok === false) {
        throw new Error(
          current.rawResponseStart ||
          current.error ||
          current.message ||
          "Backend returned ok=false."
        );
      }

      if (current.cards && Array.isArray(current.cards)) {
        return current;
      }

      if (current.detail || current.summary || current.rows || current.summaryRows || current.html) {
        return current;
      }

      if (typeof current.result !== "undefined") {
        current = current.result;
        continue;
      }

      if (typeof current.data !== "undefined") {
        current = current.data;
        continue;
      }

      if (typeof current.pack !== "undefined") {
        current = current.pack;
        continue;
      }

      if (typeof current.body !== "undefined") {
        current = current.body;
        continue;
      }

      if (typeof current.response !== "undefined") {
        current = current.response;
        continue;
      }

      return current;
    }

    return current;
  }

  function normalizeAssessmentPack(value) {
    const pack = unwrapBackendResponse(value);

    if (!pack || typeof pack !== "object") {
      throw new Error("Assessment pack is empty or invalid.");
    }

    if (!Array.isArray(pack.cards)) {
      throw new Error(
        "Assessment generated, but no cards array was found. Raw keys: " +
        Object.keys(pack).join(", ")
      );
    }

    if (!pack.meta || typeof pack.meta !== "object") {
      pack.meta = {};
    }

    if (!Array.isArray(pack.answerKey)) {
      pack.answerKey = pack.cards.map(function(card) {
        return {
          day: card.dayLabel || card.dayNumber || "",
          employeeNo: card.employeeNo || "",
          employeeId: card.employeeId || "",
          answers: Array.isArray(card.items)
            ? card.items.map(function(item) {
                return item.answer;
              })
            : []
        };
      });
    }

    return pack;
  }

  function buildPackSummary(message, pack) {
    const safePack = normalizeAssessmentPack(pack);

    return {
      message: message,
      generationMode: safePack.meta && safePack.meta.generationMode ? safePack.meta.generationMode : "",
      totalCards: Array.isArray(safePack.cards) ? safePack.cards.length : 0,
      totalAnswerKeys: Array.isArray(safePack.answerKey) ? safePack.answerKey.length : 0,
      totalDays: safePack.meta && safePack.meta.totalDays ? safePack.meta.totalDays : "",
      totalEmployees: safePack.meta && safePack.meta.totalEmployees ? safePack.meta.totalEmployees : "",
      meta: safePack.meta
    };
  }

  function showSection(id, button) {
    document.querySelectorAll(".page-section").forEach(function(section) {
      section.classList.add("hidden");
    });

    const target = document.getElementById(id);

    if (target) {
      target.classList.remove("hidden");
    }

    document.querySelectorAll(".nav button").forEach(function(btn) {
      btn.classList.remove("active");
    });

    if (button) {
      button.classList.add("active");
    }
  }

  function setStatus(id, message, type) {
    const el = document.getElementById(id);

    if (!el) {
      return;
    }

    el.textContent = message || "";
    el.className = "status" + (type ? " " + type : "");
  }

  function setBusy(id, busy) {
    const el = document.getElementById(id);

    if (el) {
      el.disabled = Boolean(busy);
    }
  }

  function showOutput(data) {
    const output = document.getElementById("output");
    const outputCard = document.querySelector(".output-card");

    if (outputCard) {
      outputCard.classList.remove("hidden");
    }

    if (!output) {
      return;
    }

    if (data && typeof data === "object" && data.html) {
      output.innerHTML = data.html;
      return;
    }

    output.textContent =
      typeof data === "string" ? data : JSON.stringify(data, null, 2);
  }

  function showError(err) {
    const message = "Error: " + (err && err.message ? err.message : String(err));
    const output = document.getElementById("output");
    const outputCard = document.querySelector(".output-card");

    if (outputCard) {
      outputCard.classList.remove("hidden");
    }

    if (output) {
      output.textContent = message;
    }

    return message;
  }

  function clearOutput() {
    const output = document.getElementById("output");

    if (output) {
      output.textContent = "Ready.";
    }
  }

  function numberValue(id, fallback) {
    const el = document.getElementById(id);
    const n = Number(el && el.value);

    return isNaN(n) ? fallback : n;

  function renderAssessmentPack(pack) {
    const viewer = document.getElementById("packViewer");
    const container = document.getElementById("packPageContainer");
    const toggleBtn = document.getElementById("answerKeyToggleBtn");

    if (!viewer || !container) {
      return;
    }

    if (!pack || !Array.isArray(pack.cards) || !pack.cards.length) {
      viewer.classList.add("hidden");
      container.innerHTML = "";

      if (toggleBtn) {
        toggleBtn.textContent = "Show Answer Key";
      }

      return;
    }

    viewer.classList.remove("hidden");

    const totalPages = Math.ceil(pack.cards.length / CARDS_PER_PAGE);

    if (currentPackPage < 0) {
      currentPackPage = 0;
    }

    if (currentPackPage >= totalPages) {
      currentPackPage = totalPages - 1;
    }

    const start = currentPackPage * CARDS_PER_PAGE;
    const pageCards = pack.cards.slice(start, start + CARDS_PER_PAGE);

    const pageIndicator = document.getElementById("packPageIndicator");

    if (pageIndicator) {
      pageIndicator.textContent = "Page " + (currentPackPage + 1) + " of " + totalPages;
    }

    if (toggleBtn) {
      toggleBtn.textContent = showPackAnswerKey ? "Hide Answer Key" : "Show Answer Key";
    }

    container.innerHTML = "";

    const page = document.createElement("div");
    page.className = "card-page";

    const grid = document.createElement("div");
    grid.className = "assessment-grid";

    pageCards.forEach(function(card) {
      grid.appendChild(buildAssessmentCardElement(card));
    });

    page.appendChild(grid);
    container.appendChild(page);

    if (showPackAnswerKey) {
      container.appendChild(buildAnswerKeyElement(pageCards, currentPackPage + 1, totalPages));
    }
  }

  function buildAssessmentCardElement(card) {
    const wrapper = document.createElement("div");
    wrapper.className = "assessment-card";

    const title = document.createElement("div");
    title.className = "assessment-card-title";
    title.textContent = formatDayLabel(card);
    wrapper.appendChild(title);

    const header = document.createElement("div");
    header.className = "assessment-card-header";
    header.innerHTML =
      "<div>Tanggal: ________________________________</div>" +
      "<div>Nama: ________________________________</div>" +
      "<div>ID Karyawan: " + escapeHtml(card && card.employeeId ? card.employeeId : "") + "</div>";
    wrapper.appendChild(header);

    const list = document.createElement("div");
    list.className = "question-list";

    const items = card && Array.isArray(card.items) ? card.items : [];

    const isStoryCard = items.some(function(item) {
      return Boolean(item.question) && !Boolean(item.text);
    });

    items.forEach(function(item, index) {
      const row = document.createElement("div");
      row.className = isStoryCard
        ? "question-row story-question-row"
        : "question-row arithmetic-question-row";

      const no = document.createElement("div");
      no.className = "question-number";
      no.textContent = String(item.no || index + 1) + ".";

      const body = document.createElement("div");
      body.className = "question-body";

      const text = document.createElement("div");
      text.className = "question-text";
      text.textContent = item.text || item.question || "";
      body.appendChild(text);

      const answerLine = document.createElement("div");
      answerLine.className = "answer-line";
      body.appendChild(answerLine);

      row.appendChild(no);
      row.appendChild(body);
      list.appendChild(row);
    });

    wrapper.appendChild(list);
    return wrapper;
  }

  function formatDayLabel(card) {
    if (!card) {
      return "HARI";
    }

    if (card.dayNumber) {
      return "HARI " + Number(card.dayNumber);
    }

    const raw = String(card.dayLabel || "").trim();

    if (!raw) {
      return "HARI";
    }

    const match = raw.match(/\d+/);

    if (match) {
      return "HARI " + Number(match[0]);
    }

    return raw.toUpperCase();
  }

  function buildAnswerKeyElement(pageCards, pageNumber, totalPages) {
    const box = document.createElement("div");
    box.className = "answer-key answer-key-panel";

    const title = document.createElement("h3");
    title.textContent = "Answer Key, Page " + pageNumber + " of " + totalPages;
    box.appendChild(title);

    const table = document.createElement("table");
    const thead = document.createElement("thead");
    const headRow = document.createElement("tr");

    ["Day", "Employee ID", "Answers"].forEach(function(header) {
      const th = document.createElement("th");
      th.textContent = header;
      headRow.appendChild(th);
    });

    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");

    pageCards.forEach(function(card) {
      const tr = document.createElement("tr");

      const day = document.createElement("td");
      day.textContent = formatDayLabel(card);

      const employee = document.createElement("td");
      employee.textContent = card && card.employeeId ? card.employeeId : "";

      const answers = document.createElement("td");
      answers.textContent = (card && Array.isArray(card.items) ? card.items : [])
        .map(function(item, index) {
          return (item.no || index + 1) + ". " + String(item.answer == null ? "" : item.answer);
        })
        .join(", ");

      tr.appendChild(day);
      tr.appendChild(employee);
      tr.appendChild(answers);
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    box.appendChild(table);

    return box;
  }

  function nextPackPage() {
    if (!currentPack || !Array.isArray(currentPack.cards)) {
      return;
    }

    const totalPages = Math.ceil(currentPack.cards.length / CARDS_PER_PAGE);

    if (currentPackPage < totalPages - 1) {
      currentPackPage++;
      renderAssessmentPack(currentPack);
    }
  }

  function previousPackPage() {
    if (!currentPack || !Array.isArray(currentPack.cards)) {
      return;
    }

    if (currentPackPage > 0) {
      currentPackPage--;
      renderAssessmentPack(currentPack);
    }
  }

  function toggleAnswerKey() {
    if (!currentPack || !Array.isArray(currentPack.cards) || !currentPack.cards.length) {
      showOutput({
        message: "Generate an assessment first, then show the answer key."
      });
      return;
    }

    showPackAnswerKey = !showPackAnswerKey;
    renderAssessmentPack(currentPack);
  }

  function rememberSelectedPdfFile(input) {
    selectedPdfFile =
      input && input.files && input.files.length
        ? input.files[0]
        : null;

    if (selectedPdfFile) {
      setStatus("pdfStatus", "Selected PDF: " + selectedPdfFile.name, "ok");
    } else {
      setStatus("pdfStatus", "No PDF selected.", "error");
    }
  }

  function getSelectedPdfFile() {
    const input = document.getElementById("pdfFile");

    if (input && input.files && input.files.length) {
      selectedPdfFile = input.files[0];
      return selectedPdfFile;
    }

    return selectedPdfFile;
  }

  function readFileAsBase64(file) {
    return new Promise(function(resolve, reject) {
      if (!file) {
        reject(new Error("Please select a PDF file."));
        return;
      }

      const reader = new FileReader();

      reader.onload = function() {
        resolve(String(reader.result || ""));
      };

      reader.onerror = function() {
        reject(reader.error || new Error("Failed to read file."));
      };

      reader.readAsDataURL(file);
    });
  }

  async function uploadPdfForGrading() {
    setBusy("pdfUploadBtn", true);

    try {
      const file = getSelectedPdfFile();

      if (!file) {
        throw new Error("Please select a PDF file.");
      }

      const fileName = String(file.name || "");

      if (!/\.pdf$/i.test(fileName) && file.type !== "application/pdf") {
        throw new Error("The selected file must be a PDF.");
      }

      setStatus("pdfStatus", "Reading PDF: " + fileName, "");

      const base64Data = await readFileAsBase64(file);

      if (!base64Data || base64Data.length < 100) {
        throw new Error("PDF could not be read as base64 data.");
      }

      const instructionEl = document.getElementById("pdfInstruction");

      setStatus("pdfStatus", "Uploading and grading PDF...", "");

      const result = await callBackend("processGradePdfUpload", {
        base64Data: base64Data,
        fileName: fileName,
        optionalInstruction: instructionEl ? instructionEl.value : ""
      });

      showOutput(result);

      if (result && result.html) {
        const resultsBox = document.getElementById("resultsTables");

        if (resultsBox) {
          resultsBox.innerHTML = result.html;
        }
      }

      setStatus("pdfStatus", "PDF grading completed.", "ok");
    } catch (err) {
      const message = showError(err);
      setStatus("pdfStatus", message, "error");
    } finally {
      setBusy("pdfUploadBtn", false);
    }
  }

  function normalizeResultsData(data) {
    data = unwrapBackendResponse(data) || {};

    if (data.detail && data.summary) {
      return data;
    }

    const detailRows = Array.isArray(data.rows) ? data.rows : [];
    const summaryRows = Array.isArray(data.summaryRows) ? data.summaryRows : [];

    return {
      detail: objectsToTableData_SYS_UI(
        data.detailSheet || DAILY_GRADE_SHEET_NAME || "Nilai_Harian",
        detailRows
      ),
      summary: objectsToTableData_SYS_UI(
        data.summarySheet || SUMMARY_SHEET_NAME || "Summary",
        summaryRows
      ),
      raw: data,
      html: data.html || ""
    };
  }

  function objectsToTableData_SYS_UI(sheetName, objects) {
    objects = Array.isArray(objects) ? objects : [];

    if (!objects.length) {
      return {
        sheetName: sheetName,
        headers: [],
        rows: []
      };
    }

    const headers = [];

    objects.forEach(function(obj) {
      Object.keys(obj || {}).forEach(function(key) {
        if (headers.indexOf(key) < 0) {
          headers.push(key);
        }
      });
    });

    const rows = objects.map(function(obj) {
      return headers.map(function(header) {
        return obj && typeof obj[header] !== "undefined" ? obj[header] : "";
      });
    });

    return {
      sheetName: sheetName,
      headers: headers,
      rows: rows
    };
  }

  function renderResultsTables(data) {
    const container = document.getElementById("resultsTables");

    if (!container) {
      return;
    }

    container.innerHTML = "";

    if (!data) {
      container.textContent = "No data.";
      return;
    }

    if (data.html && !data.detail && !data.summary) {
      container.innerHTML = data.html;
      return;
    }

    if (data.detail) {
      container.appendChild(
        buildTableElement(
          "Detail: " + (data.detail.sheetName || "Nilai_Harian"),
          data.detail.headers || [],
          data.detail.rows || []
        )
      );
    }

    if (data.summary) {
      container.appendChild(
        buildTableElement(
          "Summary: " + (data.summary.sheetName || "Summary"),
          data.summary.headers || [],
          data.summary.rows || []
        )
      );
    }

    if (!data.detail && !data.summary) {
      container.textContent = "No result table format found.";
    }
  }

  function buildTableElement(title, headers, rows) {
    const wrapper = document.createElement("div");
    wrapper.className = "table-wrap";

    const heading = document.createElement("h3");
    heading.textContent = title;
    wrapper.appendChild(heading);

    if (!headers || !headers.length) {
      const empty = document.createElement("p");
      empty.textContent = "No rows found.";
      wrapper.appendChild(empty);
      return wrapper;
    }

    const table = document.createElement("table");

    const thead = document.createElement("thead");
    const headRow = document.createElement("tr");

    headers.forEach(function(header) {
      const th = document.createElement("th");
      th.textContent = header;
      headRow.appendChild(th);
    });

    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");

    (rows || []).forEach(function(row) {
      const tr = document.createElement("tr");

      (row || []).forEach(function(cell) {
        const td = document.createElement("td");
        td.textContent = cell == null ? "" : String(cell);
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    wrapper.appendChild(table);

    return wrapper;
  }

  function downloadResultsXls() {
    if (!lastResultsData) {
      alert("Load results first.");
      return;
    }

    const normalized = normalizeResultsData(lastResultsData);

    let html = "<html><head><meta charset='UTF-8'></head><body>";

    if (normalized.detail) {
      html += tableToHtml(
        "Detail",
        normalized.detail.headers || [],
        normalized.detail.rows || []
      );
    }

    if (normalized.summary) {
      html += tableToHtml(
        "Summary",
        normalized.summary.headers || [],
        normalized.summary.rows || []
      );
    }

    html += "</body></html>";

    const blob = new Blob([html], {
      type: "application/vnd.ms-excel;charset=utf-8"
    });

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");

    a.href = url;
    a.download = "learning-tools-results.xls";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);
  }

  function tableToHtml(title, headers, rows) {
    let html = "<h2>" + escapeHtml(title) + "</h2>";
    html += "<table border='1'><thead><tr>";

    (headers || []).forEach(function(header) {
      html += "<th>" + escapeHtml(header) + "</th>";
    });

    html += "</tr></thead><tbody>";

    (rows || []).forEach(function(row) {
      html += "<tr>";

      (row || []).forEach(function(cell) {
        html += "<td>" + escapeHtml(cell) + "</td>";
      });

      html += "</tr>";
    });

    html += "</tbody></table>";

    return html;
  }

  async function clearResultSheets() {
    setBusy("clearResultsBtn", true);

    try {
      if (!confirm("Clear result sheets?")) {
        return;
      }

      setStatus("resultsStatus", "Clearing result sheets...", "");

      const result = await callBackend("clearResultSheets", {});

      lastResultsData = null;

      const resultsTables = document.getElementById("resultsTables");

      if (resultsTables) {
        resultsTables.innerHTML = "";
      }

      showOutput(result);
      setStatus("resultsStatus", "Result sheets cleared.", "ok");
    } catch (err) {
      showError(err);
      setStatus("resultsStatus", "Clear results failed.", "error");
    } finally {
      setBusy("clearResultsBtn", false);
    }
  }

  function escapeHtml(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }
</script>
