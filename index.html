
<script>
async function callBackend(action, payload) {
  const response = await fetch("/api/learning-tools", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action: action,
      payload: payload || {}
    })
  });

  const rawText = await response.text();

  let data;

  try {
    data = JSON.parse(rawText);
  } catch (err) {
    throw new Error(
      "Vercel API returned non-JSON response. HTTP " +
      response.status +
      ". Raw response starts with: " +
      rawText.substring(0, 1000)
    );
  }

  if (!data.ok) {
    throw new Error(
      data.error ||
      data.rawResponseStart ||
      "Backend returned ok=false."
    );
  }

  return data.result;
}
</script>
